<style>
  :root{
    --ink:#20261F; --parchment:#F2EEE3; --parchment-2:#E9E2D1;

    --terracotta:#B5602E; --line:#D8D0BC;

  *{box-sizing:border-box;}
  body{margin:0;background:var(--parchment);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
  .wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
  header{margin-bottom:28px;}
  .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:0.14em;color:var(--wine);font-weight:700;margin-bottom:6px;}
  h1{font-size:34px;margin:0 0 6px;line-height:1.05;}
  .subtitle{color:#5b5749;font-size:15px;margin:0;}

  .route{display:flex;margin:26px 0 30px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#fff;}
  .route-stop{flex:1;padding:14px 8px;text-align:center;cursor:pointer;border-right:1px solid var(--line);position:relative;transition:background 0.15s;}
  .route-stop:last-child{border-right:none;}
  .route-stop:hover{background:var(--parchment-2);}
  .route-stop .n{font-family:'Fraunces',serif;font-size:20px;display:block;}
  .route-stop .label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#6b6656;margin-top:2px;display:block;}
  .route-stop.active{background:var(--parchment-2);}
  .route-stop .bar{position:absolute;bottom:0;left:0;right:0;height:3px;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  input[type=text], input[type=password], select{font-family:'Inter',sans-serif;border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 12px;font-size:14px;color:var(--ink);}
  #search{flex:1;min-width:140px;}

  .region-section{margin-bottom:34px;scroll-margin-top:20px;}
  .region-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;border-bottom:2px solid var(--rc,var(--ink));padding-bottom:8px;}
  .region-head h2{font-size:22px;margin:0;color:var(--rc,var(--ink));}
  .region-count{font-size:13px;color:#8a8570;}
  .cat-group{margin-bottom:16px;}
  .cat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#8a8570;font-weight:700;margin:0 0 8px;}
  .link-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .link-main a{font-weight:600;color:var(--ink);text-decoration:none;font-size:15px;}
  .link-main a:hover{text-decoration:underline;}
  .link-main .link-title{font-weight:600;color:var(--ink);font-size:15px;}
  .block-card{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;padding:0;}
  .block-card summary{font-weight:600;color:var(--ink);font-size:15px;padding:12px 14px;cursor:pointer;list-style:none;}
  .block-card summary::-webkit-details-marker{display:none;}
  .block-card summary::before{content:'▸ ';color:var(--limestone);}
  .block-card[open] summary::before{content:'▾ ';}
  .block-body{padding:0 14px 12px;font-size:13px;color:#4a4636;line-height:1.5;}
  .block-body .taxi{margin-bottom:12px;}
  .block-body .taxi-name{font-weight:600;color:var(--ink);}
  .block-body .taxi-meta{color:#6b6656;}
  .link-main .notes{font-size:13px;color:#6b6656;margin-top:3px;}
  .map-link{display:inline-block;margin-top:6px;font-size:12px;font-weight:600;color:var(--ocean);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:2px 8px;}
  .map-link:hover{background:var(--parchment-2);}
  .day-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;margin-bottom:18px;-webkit-overflow-scrolling:touch;}
  .day-box{flex:0 0 120px;min-height:88px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 10px;display:flex;flex-direction:column;}
  .day-box.has-note{border-color:var(--rc,var(--ink));}
  .day-date{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#8a8570;font-weight:700;margin-bottom:5px;}
  .day-note{font-size:13px;color:var(--ink);line-height:1.35;}
  .empty{color:#8a8570;font-size:14px;font-style:italic;padding:8px 0 4px;}

  /* Gate */
  #gate{position:fixed;inset:0;background:var(--parchment);display:flex;align-items:center;justify-content:center;z-index:100;}
  .gate-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:34px 30px;max-width:360px;width:90%;text-align:center;}
  .gate-card .eyebrow{margin-bottom:10px;}
  .gate-card h2{margin:0 0 6px;font-size:26px;}
  .gate-card p{font-size:14px;color:#6b6656;margin:0 0 18px;}
  .gate-card input{width:100%;text-align:center;font-size:15px;margin-bottom:12px;}
  .gate-card .enter-btn{width:100%;background:var(--wine);color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
  .gate-err{color:var(--wine);font-size:13px;min-height:18px;margin-top:8px;}
</style>

function fmtDay(d){
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}
function buildDays(start, end){
  const days=[]; const s=new Date(start+'T00:00:00'); const e=new Date(end+'T00:00:00');
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
    const iso=d.toISOString().slice(0,10);
    days.push({iso, label:fmtDay(new Date(d))});
  }
  return days;
}

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){let url=(s||'').trim();if(url && !/^https?:\/\//i.test(url))url='https://'+url;return escapeHtml(url);}

/* Password gate removed — site loads directly */

/* Rendering */
function renderRouteStrip(){
  const strip=document.getElementById('routeStrip'); strip.innerHTML='';
  REGIONS.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='route-stop'+(activeRegionFilter===r.id?' active':'');
    div.innerHTML=`<span class="n">${i+1}</span><span class="label">${r.name}</span><span class="bar" style="background:${r.color}"></span>`;
    div.onclick=()=>{
      activeRegionFilter=(activeRegionFilter===r.id)?null:r.id;
      render();
      const el=document.getElementById('region-'+r.id);
      if(el && activeRegionFilter) el.scrollIntoView({behavior:'smooth',block:'start'});
    };
    strip.appendChild(div);
  });
}
function render(){
  renderRouteStrip();
  const content=document.getElementById('content'); content.innerHTML='';
  const term=searchTerm.trim().toLowerCase();
  const regionsToShow=activeRegionFilter?REGIONS.filter(r=>r.id===activeRegionFilter):REGIONS;
  regionsToShow.forEach(region=>{
    let regionLinks=LINKS.filter(l=>l.region===region.id);
    if(term) regionLinks=regionLinks.filter(l=>(l.title||'').toLowerCase().includes(term)||(l.notes||'').toLowerCase().includes(term));
    const section=document.createElement('div');
    section.className='region-section'; section.id='region-'+region.id;
    section.style.setProperty('--rc',region.color);
    const head=document.createElement('div'); head.className='region-head';
    const stayForHead=STAYS[region.id];
    let headMeta=`${regionLinks.length} saved`;
    if(stayForHead && stayForHead.start){
      const dayCount=buildDays(stayForHead.start, stayForHead.end).length;
      headMeta=`${dayCount} day${dayCount===1?'':'s'}`;
    }
    head.innerHTML=`<h2>${region.name}</h2><span class="region-count">${headMeta}</span>`;
    section.appendChild(head);

    // Day strip (if this location has a defined stay)
    const stay=STAYS[region.id];
    if(stay && !term){
      let days;
      if(stay.days){
        days=stay.days.map(d=>({iso:d.iso, label:fmtDay(new Date(d.iso+'T00:00:00')), note:d.note||''}));
      } else {
        days=buildDays(stay.start, stay.end).map(d=>({...d, note:(stay.notes && stay.notes[d.iso])||''}));
      }
      const strip=document.createElement('div'); strip.className='day-strip';
      days.forEach(day=>{
        const note=day.note;
        const box=document.createElement('div');
        box.className='day-box'+(note?' has-note':'');
        box.innerHTML=`<div class="day-date">${day.label}</div>${note?`<div class="day-note">${escapeHtml(note).replace(/\n/g,'<br>')}</div>`:''}`;
        strip.appendChild(box);
      });
      section.appendChild(strip);
    }
    if(regionLinks.length===0){
      const empty=document.createElement('div'); empty.className='empty';
      empty.textContent=term?'Nothing matches here yet.':'No links yet.';
      section.appendChild(empty);
    } else {
      regionLinks.forEach(l=>{
        if(l.block){
          const details=document.createElement('details'); details.className='block-card';
          const summary=document.createElement('summary'); summary.textContent=l.title;
          details.appendChild(summary);
          const body=document.createElement('div'); body.className='block-body';
          body.innerHTML=l.block;
          details.appendChild(body);
          section.appendChild(details);
          return;
        }
        const card=document.createElement('div'); card.className='link-card';
        const notesHtml=l.notes?`<div class="notes">${escapeHtml(l.notes)}</div>`:'';
        const mapHtml=l.map?`<a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l.map)}" target="_blank" rel="noopener">📍 Map</a>`:'';
        const titleHtml=l.url
          ? `<a href="${escapeAttr(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.title||l.url)}</a>`
          : `<span class="link-title">${escapeHtml(l.title)}</span>`;
        card.innerHTML=`<div class="link-main">${titleHtml}${notesHtml}${mapHtml}</div>`;
        section.appendChild(card);
      });
    }
    content.appendChild(section);
  });
}

document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value;render();});

function init(){ render(); }
init();
</script>
</body>
</html>
